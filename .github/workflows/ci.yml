name: CI

on:
    push:
        branches: ["main"]
    pull_request:
        branches: ["**"]

env:
    BUN_VERSION: "1.3.12"

jobs:
    build:
        runs-on: ubuntu-latest
        outputs:
            artifact-name: ${{ steps.set-artifact-name.outputs.artifact-name }}

        steps:
            - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
            - name: Setup Environment
              id: setup
              uses: ./.github/actions/setup-env
              with:
                  bun-version: ${{ env.BUN_VERSION }}

            - name: Set Artifact Name
              id: set-artifact-name
              shell: bash
              run: |
                  SAFE_BRANCH="${GITHUB_REF_NAME//\//-}"
                  SHORT_SHA="${GITHUB_SHA::7}"
                  echo "artifact-name=obsidian-pomodoro-plugin-${SAFE_BRANCH}-${SHORT_SHA}" >> "$GITHUB_OUTPUT"

            - name: Check types
              if: (success() || failure()) && steps.setup.outcome == 'success'
              run: bun run typecheck
            - name: Build
              if: (success() || failure()) && steps.setup.outcome == 'success'
              run: bun run build
            - name: Lint
              if: (success() || failure()) && steps.setup.outcome == 'success'
              run: bun run lint
            - name: Test
              if: (success() || failure()) && steps.setup.outcome == 'success'
              run: bun run test:coverage

            - name: Upload Build Artifacts
              if: (success() || failure()) && steps.setup.outcome == 'success'
              uses: actions/upload-artifact@v7
              with:
                  name: ${{ steps.set-artifact-name.outputs.artifact-name }}
                  path: |
                      main.js
                      manifest.json
                      styles.css

            - name: Upload Coverage
              if: (success() || failure()) && steps.setup.outcome == 'success'
              uses: actions/upload-artifact@v7
              with:
                  name: coverage
                  path: coverage/

    e2e:
        needs: build
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1

            - name: Setup Environment
              id: setup
              uses: ./.github/actions/setup-env
              with:
                  bun-version: ${{ env.BUN_VERSION }}

            - name: Download Build Artifacts
              uses: actions/download-artifact@v8
              with:
                  name: ${{ needs.build.outputs.artifact-name }}

            - name: Cache Obsidian
              uses: actions/cache@v6.1.0
              with:
                  path: .obsidian-cache
                  key: obsidian-cache-${{ runner.os }}-${{ hashFiles('bun.lock', 'e2e/obsidian-version.json') }}
                  restore-keys: |
                      obsidian-cache-${{ runner.os }}-

            - name: Install plugin into vault
              run: bun run vault:install

            - name: Run E2E Tests
              run: xvfb-run --auto-servernum --server-args="-screen 0 1280x1024x24" bun run test:e2e

            - name: Upload Playwright Report
              if: always()
              uses: actions/upload-artifact@v7
              with:
                  name: playwright-report
                  path: playwright-report/
