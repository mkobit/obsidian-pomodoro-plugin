"*.{js,ts,mts,cts,jsx,tsx}":
  - eslint --fix

# Scoped to tsconfig.json's `include` — root-level *.mts/*.ts config files
# (eslint.config.mts, etc.) aren't part of that project, and tsc-files
# errors ("Option 'project' cannot be mixed with source files on a command
# line") when asked to check a file outside it alongside files inside it.
"{src,tests,e2e,scripts}/**/*.{ts,tsx}":
  - tsc-files --noEmit

"playwright.config.ts":
  - tsc-files --noEmit
